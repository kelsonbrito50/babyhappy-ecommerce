name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: config.settings.test

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 apps/ config/ --max-line-length=100 --exclude=migrations

      - name: Check black formatting
        run: black apps/ config/ --check --diff --line-length=100

      - name: Check isort import order
        run: isort apps/ config/ --check-only --profile=black

  # ─── Tests + Coverage ───────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Verify health check endpoint exists
        run: python manage.py shell -c "from django.urls import reverse; reverse('health'); print('Health endpoint OK')"

      - name: Run tests with coverage
        run: |
          python -m pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── API Schema validation ──────────────────────────────────────────────────
  schema:
    name: Validate OpenAPI schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate --fail-on-warn

  # ─── Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (SAST — static security scan)
        # -ll → report medium + high severity issues; exits non-zero if any found → breaks build
        run: bandit -r apps/ config/ -ll -f txt --exclude apps/*/migrations

      - name: Run pip-audit (dependency CVE check)
        run: pip-audit --requirement requirements.txt --desc on

  # ─── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: babyhappy-ecommerce:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
